name: Release Daemon

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            name: agent-chat-daemon-darwin-arm64
          - goos: darwin
            goarch: amd64
            name: agent-chat-daemon-darwin-x64
          - goos: linux
            goarch: amd64
            name: agent-chat-daemon-linux-x64
          - goos: windows
            goarch: amd64
            name: agent-chat-daemon-win32-x64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        working-directory: machine-daemon
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o ../${{ matrix.name }}

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}

  publish-npm:
    runs-on: ubuntu-latest
    needs: build-binaries
    if: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://registry.npmjs.org

      - name: Publish package
        working-directory: daemon-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
